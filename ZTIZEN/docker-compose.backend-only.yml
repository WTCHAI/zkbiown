# ZTIZEN Docker Compose - Backend Only (Skip Frontend Build Errors)
#
# Use this to start just the backend services while frontend TypeScript errors are being fixed
#
# Usage:
#   docker-compose -f docker-compose.backend-only.yml up -d

services:
  # ============================================
  # Database Services
  # ============================================

  ztizen-db:
    image: postgres:16-alpine
    container_name: ztizen-db
    environment:
      POSTGRES_DB: ztizen
      POSTGRES_USER: ztizen
      POSTGRES_PASSWORD: ztizen_dev_password
    ports:
      - "5504:5432"
    volumes:
      - ztizen-db-data:/var/lib/postgresql/data
      - ./service-ztizen/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ztizen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ztizen-network

  ztizen-product-db:
    image: postgres:16-alpine
    container_name: ztizen-product-db
    environment:
      POSTGRES_DB: product
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product_dev_password
    ports:
      - "5505:5432"
    volumes:
      - ztizen-product-db-data:/var/lib/postgresql/data
      - ./service-product/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ztizen-network

  # ============================================
  # Backend API Services
  # ============================================

  ztizen-api:
    build:
      context: .
      dockerfile: service-ztizen/Dockerfile
    container_name: ztizen-api
    environment:
      NODE_ENV: production
      PORT: 5502
      DATABASE_URL: postgresql://ztizen:ztizen_dev_password@ztizen-db:5432/ztizen
      ZTIZEN_PARTIAL_KEY: ${ZTIZEN_PARTIAL_KEY}
      PRODUCT_API_URL: http://ztizen-product-api:5503
      FRONTEND_URL: http://localhost:5501
    ports:
      - "5502:5502"
    depends_on:
      ztizen-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ztizen-network

  ztizen-product-api:
    build:
      context: .
      dockerfile: service-product/Dockerfile
    container_name: ztizen-product-api
    environment:
      NODE_ENV: production
      PORT: 5503
      DATABASE_URL: postgresql://product:product_dev_password@ztizen-product-db:5432/product
      ZTIZEN_API_URL: http://ztizen-api:5502
      FRONTEND_URL: http://localhost:5501
    ports:
      - "5503:5503"
    depends_on:
      ztizen-product-db:
        condition: service_healthy
      ztizen-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - ztizen-network

networks:
  ztizen-network:
    driver: bridge

volumes:
  ztizen-db-data:
  ztizen-product-db-data:
